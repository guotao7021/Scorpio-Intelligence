<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>反馈处理台 | Scorpio Intelligence</title>
  <link rel="icon" href="assets/scorpio-logo-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="site.css?v=20260621-feedback-system">
  <script src="feedback_admin.js?v=20260621-feedback-system" defer></script>
</head>
<body class="feedback-admin-page">
  <header class="site-header">
    <a class="brand" href="index-cn.html" aria-label="Scorpio Intelligence 首页">
      <img src="assets/scorpio-logo-horizontal.svg" alt="Scorpio Intelligence">
    </a>
    <nav aria-label="管理员导航">
      <a href="index-cn.html">官网首页</a>
      <a href="feedback-cn.html">反馈入口</a>
      <a href="account.html">用户中心</a>
      <a href="scorpio_v1_admin.html">授权后台</a>
      <a class="active" href="feedback_admin.html">反馈处理台</a>
    </nav>
  </header>

  <main class="feedback-admin-console">
    <section class="feedback-admin-head">
      <div>
        <p class="section-kicker">Feedback Ops</p>
        <h1>反馈处理台</h1>
        <p>集中查看用户 bug、体验反馈、在线提问和问卷结果。这里复用 Cloudflare 管理员 Token，不在页面中保存服务端密钥。</p>
      </div>
      <form class="feedback-token-card" id="feedbackTokenForm">
        <label>Admin Token
          <input id="feedbackAdminToken" type="password" autocomplete="off" placeholder="粘贴 ADMIN_API_TOKEN" required>
        </label>
        <div>
          <button class="button primary" type="submit">连接反馈池</button>
          <button class="button secondary" id="clearFeedbackToken" type="button">清除</button>
        </div>
        <p id="feedbackAdminMessage" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="feedback-admin-metrics" aria-label="反馈概览">
      <article><span>全部反馈</span><strong id="metricFeedbackTotal">-</strong><small>当前筛选结果</small></article>
      <article><span>待处理</span><strong id="metricFeedbackOpen">-</strong><small>new / triaged / in_progress</small></article>
      <article><span>高优先级</span><strong id="metricFeedbackHigh">-</strong><small>high / urgent</small></article>
      <article><span>问卷记录</span><strong id="metricFeedbackSurvey">-</strong><small>survey</small></article>
    </section>

    <section class="feedback-admin-workbench">
      <aside class="feedback-filter-card">
        <p class="section-kicker">Filters</p>
        <label>关键词
          <input id="feedbackSearch" type="search" placeholder="编号、邮箱、标题、内容">
        </label>
        <label>状态
          <select id="feedbackStatusFilter">
            <option value="">全部状态</option>
            <option value="new">新反馈</option>
            <option value="triaged">已分诊</option>
            <option value="in_progress">处理中</option>
            <option value="resolved">已解决</option>
            <option value="closed">已关闭</option>
          </select>
        </label>
        <label>类型
          <select id="feedbackTypeFilter">
            <option value="">全部类型</option>
            <option value="bug">Bug</option>
            <option value="experience">体验反馈</option>
            <option value="question">在线提问</option>
            <option value="survey">问卷调查</option>
          </select>
        </label>
        <button class="button secondary" id="refreshFeedbackButton" type="button">刷新列表</button>
      </aside>

      <section class="feedback-list-card">
        <div class="feedback-list-head">
          <div>
            <p class="section-kicker">Inbox</p>
            <h2>反馈记录</h2>
          </div>
          <span id="feedbackListMeta">等待连接</span>
        </div>
        <div class="feedback-inbox" id="feedbackInbox"></div>
      </section>

      <aside class="feedback-detail-card" id="feedbackDetail">
        <p class="section-kicker">Detail</p>
        <h2>选择一条反馈</h2>
        <p class="muted">点击左侧反馈后，可以查看完整内容并更新状态。</p>
      </aside>
    </section>
  </main>
</body>
</html>
