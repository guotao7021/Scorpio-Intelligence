    <div class="faq-item">
      <h2>如何下载客户端安装包？</h2>
      <p>请进入用户中心注册或登录账号。登录后系统会读取当前开放版本，并在安装包已配置时显示下载按钮。安装包不直接存放在官网仓库中。</p>
    </div>
    <div class="faq-item">
      <h2>应该怎么反馈问题？</h2>
      <p>建议直接从反馈页打开 GitHub Issue。请尽量附上版本、环境、操作步骤，以及截图或日志，这样更容易定位。</p>
    </div>
    <div class="faq-item">
      <h2>路线图会展示什么？</h2>
      <p>只展示可以公开表达的事项，不写内部实现细节，也不轻易承诺日期。</p>
