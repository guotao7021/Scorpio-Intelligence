<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>反馈 | Scorpio Intelligence</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <main class="feedback-shell">
    <div class="feedback-grid">
      <section class="feedback-panel">
        <div class="section-kicker">反馈</div>
        <h1>告诉我们你遇到了什么</h1>
        <p>请通过 GitHub Issues 提交问题、建议或用户体验反馈。这样每一条反馈都能被追踪、分派，并保持在一个明确的处理路径里。</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/guotao7021/Scorpio-Intelligence/issues/new?template=bug_report.md">提交问题</a>
          <a class="button secondary" href="https://github.com/guotao7021/Scorpio-Intelligence/issues/new?template=feature_request.md">提出建议</a>
        </div>
        <ul>
          <li>你做了什么</li>
          <li>你原本预期什么</li>
          <li>实际发生了什么</li>
          <li>版本或构建号</li>
          <li>系统环境</li>
          <li>日志或截图，如有</li>
        </ul>
      </section>
      <aside class="mini-card">
        <strong>我们最需要的信息</strong>
        <p>越具体，处理越快。建议附上你所在页面、操作步骤和最终结果。</p>
        <strong style="margin-top:18px;">推荐流程</strong>
        <ul>
          <li>从本页打开 Issue</li>
          <li>必要时补充证据</li>
          <li>返回首页继续浏览</li>
        </ul>
        <p style="margin-top:18px;"><a href="index-cn.html">返回首页</a></p>
      </aside>
    </div>
  </main>
</body>
</html>
