name = "scorpio-license-api"
main = "src/worker.js"
compatibility_date = "2026-06-16"

# Add this route only after the Cloudflare zone is Active and DNS is owned by Cloudflare:
# routes = [
#   { pattern = "api.scorpio-intelligence.tech/*", custom_domain = true }
# ]

[vars]
APP_NAME = "Scorpio Intelligence"
CORS_ALLOWED_ORIGINS = "https://scorpio-intelligence.pages.dev,https://www.scorpio-intelligence.tech,https://scorpio-intelligence.tech"
REGISTRATION_TRIAL_EDITION = "personal_pro"
REGISTRATION_TRIAL_DAYS = "7"
LICENSE_AUTO_ISSUE_EDITIONS = "personal_standard,personal_pro"
JWT_ACCESS_SECONDS = "3600"
JWT_REFRESH_SECONDS = "1209600"
MAX_OFFLINE_DAYS = "7"
ANALYSIS_COMPUTE_TIMEOUT_MS = "4500"
ANALYSIS_SHARED_CACHE_SECONDS = "300"
ANALYSIS_RATE_LIMIT_PER_MINUTE = "120"
ANALYSIS_REPLAY_WINDOW_SECONDS = "300"
ANALYSIS_REQUIRE_REQUEST_SIGNATURE = "1"
ANALYSIS_REQUIRE_LICENSE_ID = "1"
AUTH_CODE_IP_RATE_LIMIT_PER_HOUR = "10"
AUTH_CODE_EMAIL_RATE_LIMIT_PER_HOUR = "3"
FEEDBACK_RATE_LIMIT_PER_HOUR = "5"
FEEDBACK_CODE_IP_RATE_LIMIT_PER_HOUR = "5"
FEEDBACK_CODE_EMAIL_RATE_LIMIT_PER_HOUR = "3"
PUBLIC_PRODUCT_VIDEO_R2_KEY = "产品介绍/Scorpio_Intelligence_Product_Introduction.mp4"
PUBLIC_PRODUCT_VIDEO_CACHE_SECONDS = "86400"
ALIYUN_CDN_DOWNLOAD_HOST = "download-hk.scorpio-intelligence.tech"
ALIYUN_CDN_SIGN_TTL_SECONDS = "600"
ALIYUN_CDN_DOWNLOAD_ENABLED = "0"

[[d1_databases]]
binding = "DB"
database_name = "scorpio-license-db"
database_id = "44338085-38a1-4283-b6c9-91fb0d78e0ac"

[[r2_buckets]]
binding = "RELEASE_BUCKET"
bucket_name = "scorpio-releases"
